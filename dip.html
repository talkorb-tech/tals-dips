<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הסלטים של טל</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="site-header">
    <div class="brand-row">
      <img class="site-logo" src="logo.png" alt="הסלטים של טל" />
      <div class="brand">הסלטים של טל</div>
    </div>
    <div class="tagline">טרי · טבעי · ביתי</div>
  </header>

  <div id="content"></div>

  <footer class="site-footer">
    עשוי עם אהבה 🤍
  </footer>

  <script>
    // Always fetch fresh data — bypasses browser cache
    fetch('data.js', { cache: 'no-cache' })
      .then(r => r.text())
      .then(code => {
        const getData = new Function(code + '; return dips;');
        renderDip(getData());
      });

    function renderDip(dips) {
      const params  = new URLSearchParams(window.location.search);
      const id      = params.get('id');
      const dip     = dips[id];
      const content = document.getElementById('content');

      if (!dip) {
        content.innerHTML = `
          <div class="not-found">
            <span class="big-emoji">🤷</span>
            <h2>סלט לא נמצא</h2>
            <p>נסו לסרוק את הברקוד שוב, או <a href="index.html">חזרו לדף הבית</a>.</p>
          </div>`;
        return;
      }

      document.title = `${dip.name} — הסלטים של טל`;

      const ingredientsHTML = (dip.ingredients || []).map(i => `<li>${i}</li>`).join('');
      const usesHTML        = (dip.uses        || []).map(u => `<li>${u}</li>`).join('');

      const priceHTML = dip.price
        ? `<div class="dip-price" style="color:${dip.accent}">₪${dip.price}</div>`
        : '';

      // Hero: photo if the dip has one (graphic already shows name + ingredients),
      // otherwise the classic emoji + name hero.
      const heroHTML = dip.image
        ? `<div class="dip-hero-img">
             <img src="${dip.image}" alt="${dip.name}" />
           </div>
           ${dip.tagline ? `<div class="dip-tagline-under">${dip.tagline}</div>` : ''}`
        : `<div class="dip-hero" style="background:${dip.color}; margin:16px 16px 0; border-radius:16px;">
             <span class="dip-emoji">${dip.emoji}</span>
             <div class="dip-name">${dip.name}</div>
             <div class="dip-tagline">${dip.tagline}</div>
           </div>`;

      // With a photo we skip the duplicate "מה בפנים" (ingredients) block,
      // since the name and ingredients already appear inside the graphic.
      const ingredientsBlock = dip.image ? '' : `
          <div class="section-card">
            <div class="section-label">מה בפנים</div>
            <ul class="ingredients-list">${ingredientsHTML}</ul>
          </div>`;

      content.innerHTML = `
        <div class="dip-page">
          <a href="index.html" class="back-btn">← כל הסלטים</a>

          ${heroHTML}
          ${priceHTML}

          <div style="height:16px"></div>

          <div class="section-card">
            <div class="section-label">על הסלט</div>
            <div class="section-body">${dip.description}</div>
          </div>
          ${ingredientsBlock}
          <div class="section-card">
            <div class="section-label" style="color:${dip.accent}">איך להשתמש</div>
            <ul class="uses-list">${usesHTML}</ul>
          </div>
        </div>`;

      // Accent color for checkmarks
      const style = document.createElement('style');
      style.textContent = `.uses-list li::before { color: ${dip.accent}; }`;
      document.head.appendChild(style);
    }
  </script>

</body>
</html>
